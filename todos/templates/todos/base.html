<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface-2: #22222d;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent-dim: #4a3fbf;
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    header {
      margin-bottom: 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
    }
    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-bottom: 2px;
    }
    .stats {
      margin-left: auto;
      display: flex;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .stats span strong {
      color: var(--text);
      font-size: 1.1rem;
    }

    /* Messages */
    .messages {
      margin-bottom: 1rem;
    }
    .message {
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      background: var(--surface-2);
      border-left: 3px solid var(--accent);
    }

    /* Add form */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .add-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }
    .form-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus {
      border-color: var(--accent);
    }
    .form-input::placeholder { color: var(--text-muted); }
    select.form-input { cursor: pointer; }
    textarea.form-input { resize: vertical; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }

    .details-toggle {
      background: none; border: none;
      color: var(--text-muted); font-size: 0.82rem;
      cursor: pointer; margin-top: 0.5rem;
      padding: 0;
    }
    .details-toggle:hover { color: var(--accent); }
    .extra-fields { margin-top: 0.75rem; display: none; }
    .extra-fields.open { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      align-items: center;
    }
    .filter-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-sep {
      width: 1px; height: 18px;
      background: var(--border);
      margin: 0 0.25rem;
    }

    /* Todo list */
    .todo-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      transition: border-color 0.15s;
    }
    .todo-item:hover { border-color: var(--accent-dim); }
    .todo-item.done { opacity: 0.55; }

    .todo-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .todo-check:hover { border-color: var(--accent); }
    .todo-item.done .todo-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .todo-check svg { display: none; }
    .todo-item.done .todo-check svg { display: block; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }
    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .todo-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .todo-meta {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      align-items: center;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-high { background: #3b1111; color: var(--red); }
    .badge-medium { background: #2d2211; color: var(--yellow); }
    .badge-low { background: #0e2b1a; color: var(--green); }
    .todo-date { font-size: 0.75rem; color: var(--text-muted); }

    .todo-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
      align-items: flex-start;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.9rem; }

    /* Footer actions */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    function toggleExtra() {
      const el = document.querySelector('.extra-fields');
      const btn = document.querySelector('.details-toggle');
      el.classList.toggle('open');
      btn.textContent = el.classList.contains('open') ? '− fewer options' : '+ priority & description';
    }
  </script>
</body>
</html>
