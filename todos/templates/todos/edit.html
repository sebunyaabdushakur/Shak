{% extends 'todos/base.html' %}
{% block content %}

<header>
  <span class="dot"></span>
  <h1>Shak - Edit Task</h1>
</header>

<div class="add-card">
  <form method="post">
    {% csrf_token %}
    <div style="display:flex; flex-direction:column; gap:0.75rem;">
      {{ form.title }}
      {{ form.priority }}
      {{ form.description }}
      <div style="display:flex; gap:0.5rem; margin-top:0.25rem;">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{% url 'todo_list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </form>
</div>

{% endblock %}
